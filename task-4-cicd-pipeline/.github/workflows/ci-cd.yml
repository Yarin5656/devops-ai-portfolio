name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "task-4-cicd-pipeline/**"
  pull_request:
    branches: ["main"]
    paths:
      - "task-4-cicd-pipeline/**"

defaults:
  run:
    working-directory: task-4-cicd-pipeline

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: task-4-cicd-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            -v

  # ── 2. Build Docker image ──────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — validation only)
        uses: docker/build-push-action@v6
        with:
          context: task-4-cicd-pipeline
          push: false
          tags: task-4-cicd-pipeline:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Validate Kubernetes manifests ──────────────────────────────────────
  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Validate deployment manifest
        run: kubectl apply --dry-run=client -f k8s/deployment.yaml --validate=false

      - name: Validate service manifest
        run: kubectl apply --dry-run=client -f k8s/service.yaml --validate=false

      - name: Confirm manifest files exist
        run: |
          echo "=== Kubernetes manifest files ==="
          ls -lh k8s/
          echo "All manifests present."
